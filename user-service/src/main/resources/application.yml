server:
    port: 8083
spring:
    application:
        name: user-service
    datasource:
        url: jdbc:h2:mem:userdb
        driver-class-name: org.h2.Driver
    h2:
        console:
            enabled: true
    jpa:
        hibernate:
            ddl-auto: update
    rabbitmq:
        host: localhost
        port: 5672
        username: guest
        password: guest

    eureka:
        client:
            service-url:
                defaultZone: http://localhost:8761/eureka/

    management:
        endpoints:
            web:
                exposure:
                    include: "*"